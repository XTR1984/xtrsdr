<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Web Flasher — Auto-load from Releases</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        button, select { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; height: 300px; overflow-y: auto; }
        .error { color: #f48771; }
        .success { color: #6a9955; }
        .info { color: #9cdcfe; }
        .warning { color: #dcdcaa; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .release-info { background: #f0f0f0; padding: 10px; border-radius: 5px; margin: 10px 0; }
        .lang-switch { text-align: right; margin-bottom: 10px; }
        .lang-btn { padding: 5px 10px; margin: 0 2px; font-size: 14px; }
        .lang-btn.active { background: #0066cc; color: white; border-color: #0066cc; }
        [data-en] { display: none; }
        [data-ru] { display: none; }
        body.lang-en [data-en] { display: inline; }
        body.lang-en [data-ru] { display: none; }
        body.lang-ru [data-ru] { display: inline; }
        body.lang-ru [data-en] { display: none; }
        .text-en, .text-ru { display: none; }
        body.lang-en .text-en { display: block; }
        body.lang-ru .text-ru { display: block; }
        .inline-en, .inline-ru { display: none; }
        body.lang-en .inline-en { display: inline; }
        body.lang-ru .inline-ru { display: inline; }
    </style>
</head>
<body class="lang-en">
    <div class="lang-switch">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
    </div>

    <h1><span class="inline-en">🔧 Flash ESP32 from GitHub Releases</span><span class="inline-ru">🔧 Прошивка ESP32 из GitHub Releases</span></h1>
    
    <div class="release-info">
        <label><span class="inline-en">📦 Select firmware version:</span><span class="inline-ru">📦 Выберите версию прошивки:</span></label>
        <select id="versionSelect" style="width: 70%; padding: 8px; margin-left: 10px;">
            <option value=""><span class="inline-en">Loading versions...</span><span class="inline-ru">Загрузка списка версий...</span></option>
        </select>
        <button id="loadVersionsBtn" style="margin-left: 10px;">🔄</button>
    </div>
    
    <div>
        <button id="connectBtn"><span class="inline-en">1️⃣ Connect to ESP</span><span class="inline-ru">1️⃣ Подключиться к ESP</span></button>
        <button id="flashBtn" disabled><span class="inline-en">2️⃣ Flash selected version</span><span class="inline-ru">2️⃣ Прошить выбранную версию</span></button>
    </div>
    
    <div id="log"></div>

      
    <script type="module">
        import {    
            ESPLoader,
            Transport,
        } from "https://unpkg.com/esptool-js/bundle.js";;        
        const GITHUB_USERNAME = "xtr1984";
        const REPO_NAME = "xtrsdr";
        const FIRMWARE_FILENAME = "firmware.bin";
        const FIRMWARE_ADDRESS = 0x1000;
        
        let transport, esploader;
        let selectedRelease = null;
        let releasesList = [];
        
        const connectBtn = document.getElementById('connectBtn');
        const flashBtn = document.getElementById('flashBtn');
        const versionSelect = document.getElementById('versionSelect');
        const loadVersionsBtn = document.getElementById('loadVersionsBtn');
        const logDiv = document.getElementById('log');
        
        const strings = {
            en: {
                loading: "Loading versions...",
                noReleases: "No releases",
                releasesNotFound: "Releases not found. Create a release on GitHub with file",
                loaded: "Loaded",
                releases: "releases",
                noFirmware: "no firmware file",
                selected: "Selected release:",
                file: "File:",
                noFileInRelease: "No firmware file in release",
                downloading: "Downloading",
                from: "from release",
                source: "Source:",
                downloaded: "Downloaded",
                bytes: "bytes",
                requestPort: "Requesting COM port access...",
                detectingChip: "Detecting chip...",
                connected: "Connected:",
                error: "Error:",
                noReleaseSelected: "No release selected",
                startingFlash: "Starting flash...",
                progress: "Progress:",
                flashComplete: "Flash completed successfully!",
                deviceReset: "Device reset",
                flashError: "Flash error:",
                instruction1: "1. Select firmware version from list",
                instruction2: "2. Click 'Connect to ESP' and select COM port",
                instruction3: "3. Click 'Flash selected version'",
                firmwareNameNote: "Firmware file must be named",
                inRelease: "in the release on GitHub"
            },
            ru: {
                loading: "Загрузка списка версий...",
                noReleases: "Нет релизов",
                releasesNotFound: "Релизы не найдены. Создайте релиз на GitHub с файлом",
                loaded: "Загружено",
                releases: "релизов",
                noFirmware: "нет файла прошивки",
                selected: "Выбран релиз:",
                file: "Файл:",
                noFileInRelease: "В релизе нет файла прошивки",
                downloading: "Скачивание",
                from: "из релиза",
                source: "Источник:",
                downloaded: "Скачано",
                bytes: "байт",
                requestPort: "Запрос доступа к COM-порту...",
                detectingChip: "Определение чипа...",
                connected: "Подключено:",
                error: "Ошибка:",
                noReleaseSelected: "Релиз не выбран",
                startingFlash: "Начало прошивки...",
                progress: "Прогресс:",
                flashComplete: "Прошивка успешно завершена!",
                deviceReset: "Устройство перезагружено",
                flashError: "Ошибка прошивки:",
                instruction1: "1. Выберите версию прошивки из списка",
                instruction2: "2. Нажмите 'Подключиться к ESP' и выберите COM-порт",
                instruction3: "3. Нажмите 'Прошить выбранную версию'",
                firmwareNameNote: "Файл прошивки должен называться",
                inRelease: "в релизе на GitHub"
            }
        };
        
        let currentLang = 'en';
        
        function t(key) {
            return strings[currentLang][key] || key;
        }
        
        function log(message, type = 'info', langKey = null) {
            const entry = document.createElement('div');
            let displayMessage = message;
            if (langKey && currentLang === 'ru' && strings.ru[langKey]) {
                displayMessage = strings.ru[langKey];
            } else if (langKey && currentLang === 'en' && strings.en[langKey]) {
                displayMessage = strings.en[langKey];
            }
            entry.textContent = displayMessage;
            entry.className = type;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(displayMessage);
        }
        
        async function loadReleases() {
            try {
                log(`📡 ${t('loading')}...`, 'info');
                versionSelect.disabled = true;
                versionSelect.innerHTML = `<option>${t('loading')}...</option>`;
                
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/releases`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                releasesList = await response.json();
                
                if (releasesList.length === 0) {
                    versionSelect.innerHTML = `<option>${t('noReleases')}</option>`;
                    log(`${t('releasesNotFound')} ${FIRMWARE_FILENAME}`, 'warning');
                    return;
                }
                
                versionSelect.innerHTML = releasesList.map(release => {
                    const hasFirmware = release.assets.some(a => a.name === FIRMWARE_FILENAME);
                    return `<option value="${release.tag_name}" data-release='${JSON.stringify(release)}' 
                            style="${hasFirmware ? '' : 'background:#ffcccc;'}">
                            ${release.tag_name} - ${release.name || 'untitled'} 
                            ${hasFirmware ? '✅' : `❌ ${t('noFirmware')}`}
                           </option>`;
                }).join('');
                
                log(`✅ ${t('loaded')} ${releasesList.length} ${t('releases')}`, 'success');
                versionSelect.disabled = false;
                
                const latestWithFirmware = releasesList.find(r => r.assets.some(a => a.name === FIRMWARE_FILENAME));
                if (latestWithFirmware) {
                    versionSelect.value = latestWithFirmware.tag_name;
                    selectRelease(latestWithFirmware);
                }
                
            } catch (error) {
                log(`❌ ${t('error')} ${error.message}`, 'error');
                versionSelect.innerHTML = `<option>${t('error')}</option>`;
            }
        }
        
        function selectRelease(release) {
            selectedRelease = release;
            const hasFirmware = release.assets.some(a => a.name === FIRMWARE_FILENAME);
            
            if (hasFirmware) {
                log(`${t('selected')} ${release.tag_name}`, 'success');
                const firmwareAsset = release.assets.find(a => a.name === FIRMWARE_FILENAME);
                log(`${t('file')} ${FIRMWARE_FILENAME} (${Math.round(firmwareAsset.size / 1024)} KB)`, 'info');
            } else {
                log(`${t('noFileInRelease')} ${release.tag_name}`, 'warning');
            }
        }
        
        async function downloadFirmwareFromRelease() {
            if (!selectedRelease) {
                throw new Error(t('noReleaseSelected'));
            }
            
            const firmwareAsset = selectedRelease.assets.find(a => a.name === FIRMWARE_FILENAME);
            if (!firmwareAsset) {
                throw new Error(`${t('noFileInRelease')} ${selectedRelease.tag_name}`);
            }
            
            log(`${t('downloading')} ${FIRMWARE_FILENAME} ${t('from')} ${selectedRelease.tag_name}...`, 'info');
            log(`${t('source')} ${firmwareAsset.browser_download_url}`, 'info');
            
            const response = await fetch(firmwareAsset.url, {
                headers: {
                    "Accept": "application/octet-stream"
                }
            });
            if (!response.ok) throw new Error(`Download error: HTTP ${response.status}`);
            
            const arrayBuffer = await response.arrayBuffer();
            const firmwareData = new Uint8Array(arrayBuffer);
            
            log(`✅ ${t('downloaded')} ${firmwareData.length} ${t('bytes')} (${Math.round(firmwareData.length / 1024)} KB)`, 'success');
            return firmwareData;
        }
        
        connectBtn.addEventListener('click', async () => {
            try {
                log(t('requestPort'), 'info');
                const port = await navigator.serial.requestPort({
                    filters: [
//                        { usbVendorId: 0x1a86, usbProductId: 0x55d3}
                    ]
                });
                
                transport = new Transport(port, true);
                esploader = new ESPLoader({
                    transport: transport,
                    baudrate: 115200,
                    terminal: {
                        clean: () => log('=== CLEAR ===', 'info'),
                        writeLine: (data) => log(data, 'info'),
                        write: (data) => log(data, 'info')
                    }
                });
                
                log(t('detectingChip'), 'info');
                const chipName = await esploader.main();
                log(`${t('connected')} ${chipName}`, 'success');
                
                connectBtn.disabled = true;
                flashBtn.disabled = false;
                
            } catch (error) {
                log(`${t('error')} ${error.message}`, 'error');
                if (transport) await transport.disconnect();
            }
        });
        
        flashBtn.addEventListener('click', async () => {
            if (!selectedRelease) {
                log(t('noReleaseSelected'), 'error');
                return;
            }
            
            try {
                flashBtn.disabled = true;
                
                const firmwareData = await downloadFirmwareFromRelease();
                
                log(t('startingFlash'), 'info');
                const flashOptions = {
                    fileArray: [{ data: firmwareData, address: FIRMWARE_ADDRESS }],
                    eraseAll: false,
                    compress: true,
                    reportProgress: (fileIndex, written, total) => {
                        const percent = Math.round((written / total) * 100);
                        if (percent % 20 === 0) log(`${t('progress')} ${percent}%`, 'info');
                    }
                };
                
                await esploader.writeFlash(flashOptions);
                
                log(`✅ ${t('flashComplete')}`, 'success');
                
                await esploader.hardReset();
                log(t('deviceReset'), 'success');
                
            } catch (error) {
                log(`${t('flashError')} ${error.message}`, 'error');
            } finally {
                flashBtn.disabled = false;
            }
        });
        
        versionSelect.addEventListener('change', () => {
            const selectedTag = versionSelect.value;
            const release = releasesList.find(r => r.tag_name === selectedTag);
            if (release) selectRelease(release);
        });
        
        loadVersionsBtn.addEventListener('click', () => loadReleases());
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                document.body.classList.remove('lang-en', 'lang-ru');
                document.body.classList.add(`lang-${currentLang}`);
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        loadReleases();
        
        setTimeout(() => {
            log(`💡 ${t('instruction1')}`, 'info');
            log(`💡 ${t('instruction2')}`, 'info');
            log(`💡 ${t('instruction3')}`, 'info');
            log(`📌 ${t('firmwareNameNote')} "${FIRMWARE_FILENAME}" ${t('inRelease')}`, 'warning');
        }, 500);
    </script>
</body>
</html>
